<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makhi-Bot · daily questions</title>
  <!-- Telegram script: gives the form access to the theme, buttons and sending data to the bot -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Load the stylesheet with the ?v= from the page URL so a new bot version busts the cache -->
  <script>
    (function () {
      var v = new URLSearchParams(location.search).get("v");
      var suffix = v ? "?v=" + encodeURIComponent(v) : "";
      document.write('<link rel="stylesheet" href="style.css' + suffix + '">');
    })();
  </script>
  <noscript><link rel="stylesheet" href="style.css"></noscript>
</head>
<body>
  <main class="card">
    <h1 data-translate="title">Daily check-in</h1>
    <p class="subtitle" data-translate="subtitle">How was your day?</p>

    <form id="form">

      <!-- ===== Date being filled in ===== -->
      <label class="field date-field">
        <span data-translate="q_date">Date</span>
        <input type="date" name="date" id="dateInput">
      </label>
      <p class="date-taken-msg" id="dateWarning" data-translate="date_taken" hidden>This date is already filled — pick another.</p>

      <!-- ===== Overall state (kept at the top, next to the date) ===== -->
      <label class="field slider">
        <span class="slider-head"><span data-translate="q_state">Overall state</span><output>4</output></span>
        <input type="range" name="state" min="0" max="9" value="4">
      </label>

      <!-- ===== Sleep ===== -->
      <section class="group">
        <h2 class="group-title" data-translate="sec_sleep">Sleep</h2>

        <div class="times">
          <label class="field">
            <span data-translate="q_bedtime">Fell asleep at</span>
            <input type="time" name="bedtime">
          </label>
          <label class="field">
            <span data-translate="q_wake">Woke up at</span>
            <input type="time" name="wake">
          </label>
        </div>

        <div class="sleep-viz">
          <svg viewBox="0 0 120 120" class="clock" aria-hidden="true">
            <circle cx="60" cy="60" r="52" class="ring-bg"></circle>
            <path id="sleepArc" class="ring-arc" d=""></path>
          </svg>
          <div class="sleep-duration">
            <span data-translate="sleep_duration_label">Sleep duration</span>
            <strong id="sleepDuration">—</strong>
          </div>
        </div>
      </section>

      <!-- ===== Sleep quality, dreams ===== -->
      <label class="field slider">
        <span class="slider-head"><span data-translate="q_sleep_quality">Sleep quality</span><output>2</output></span>
        <input type="range" name="sleep_quality" min="0" max="4" value="2">
      </label>

      <div class="field">
        <span class="label" data-translate="q_dreams">Dreams?</span>
        <div class="segmented" data-name="dreams">
          <label><input type="radio" name="dreams" value="none" checked><span data-translate="dream_none">None</span></label>
          <label><input type="radio" name="dreams" value="dreams"><span data-translate="dream_dreams">Dreams</span></label>
          <label><input type="radio" name="dreams" value="nightmares"><span data-translate="dream_nightmares">Nightmares</span></label>
        </div>
      </div>

      <label class="field" id="dreamNoteField" hidden>
        <span data-translate="q_dream_note">What was the dream about?</span>
        <textarea name="dream_note" rows="3" data-translate-placeholder="dream_note_placeholder" placeholder="what happened in the dream..."></textarea>
      </label>

      <!-- ===== Scales 1–5 ===== -->
      <section class="group">
        <h2 class="group-title" data-translate="sec_scales">How you felt (1–5)</h2>

        <label class="field slider">
          <span class="slider-head"><span data-translate="q_anxiety">Anxiety</span><output>2</output></span>
          <input type="range" name="anxiety" min="0" max="4" value="2">
        </label>
        <label class="field slider">
          <span class="slider-head"><span data-translate="q_irritability">Irritability</span><output>2</output></span>
          <input type="range" name="irritability" min="0" max="4" value="2">
        </label>
        <label class="field slider">
          <span class="slider-head"><span data-translate="q_libido">Libido</span><output>2</output></span>
          <input type="range" name="libido" min="0" max="4" value="2">
        </label>
        <label class="field slider">
          <span class="slider-head"><span data-translate="q_drowsiness">Drowsiness</span><output>2</output></span>
          <input type="range" name="drowsiness" min="0" max="4" value="2">
        </label>
        <label class="field slider">
          <span class="slider-head"><span data-translate="q_appetite">Appetite</span><output>2</output></span>
          <input type="range" name="appetite" min="0" max="4" value="2">
        </label>
        <label class="field slider">
          <span class="slider-head"><span data-translate="q_energy">Energy</span><output>2</output></span>
          <input type="range" name="energy" min="0" max="4" value="2">
        </label>
        <label class="field slider">
          <span class="slider-head"><span data-translate="q_ate_well">Ate well</span><output>2</output></span>
          <input type="range" name="ate_well" min="0" max="4" value="2">
        </label>
      </section>

      <!-- ===== Yes / No ===== -->
      <section class="group">
        <h2 class="group-title" data-translate="sec_today">Today</h2>

        <div class="field yesno">
          <span class="label" data-translate="q_menstruation">Menstruation</span>
          <div class="segmented small" data-name="menstruation">
            <label><input type="radio" name="menstruation" value="no" checked><span data-translate="no">No</span></label>
            <label><input type="radio" name="menstruation" value="yes"><span data-translate="yes">Yes</span></label>
          </div>
        </div>
        <div class="field yesno">
          <span class="label" data-translate="q_sex">Sex</span>
          <div class="segmented small" data-name="sex">
            <label><input type="radio" name="sex" value="no" checked><span data-translate="no">No</span></label>
            <label><input type="radio" name="sex" value="yes"><span data-translate="yes">Yes</span></label>
          </div>
        </div>
        <div class="field yesno">
          <span class="label" data-translate="q_masturbation">Masturbation</span>
          <div class="segmented small" data-name="masturbation">
            <label><input type="radio" name="masturbation" value="no" checked><span data-translate="no">No</span></label>
            <label><input type="radio" name="masturbation" value="yes"><span data-translate="yes">Yes</span></label>
          </div>
        </div>
        <div class="field yesno">
          <span class="label" data-translate="q_headache">Headache</span>
          <div class="segmented small" data-name="headache">
            <label><input type="radio" name="headache" value="no" checked><span data-translate="no">No</span></label>
            <label><input type="radio" name="headache" value="yes"><span data-translate="yes">Yes</span></label>
          </div>
        </div>
        <div class="field yesno">
          <span class="label" data-translate="q_smoking">Smoking</span>
          <div class="segmented small" data-name="smoking">
            <label><input type="radio" name="smoking" value="no" checked><span data-translate="no">No</span></label>
            <label><input type="radio" name="smoking" value="yes"><span data-translate="yes">Yes</span></label>
          </div>
        </div>
      </section>

      <!-- ===== Medications ===== -->
      <section class="group">
        <h2 class="group-title" data-translate="sec_meds">Medications</h2>
        <p class="hint" data-translate="meds_hint">Pick what you took; the dose in mg is pre-filled and editable.</p>

        <!-- Pick a drug from the list; it gets added as a row below (scales to a long list). -->
        <select id="medPicker" class="med-picker">
          <option value="" data-translate="med_add" selected>+ Add a medication…</option>
          <option value="Lamotrigine" data-translate="med_lamotrigine">Lamotrigine</option>
          <option value="Olanzapine" data-translate="med_olanzapine">Olanzapine</option>
          <option value="Fluoxetine" data-translate="med_fluoxetine">Fluoxetine</option>
          <option value="Trittico" data-translate="med_trittico">Trittico</option>
          <option value="Grandaxin" data-translate="med_grandaxin">Grandaxin</option>
          <option value="Ibuprofen" data-translate="med_ibuprofen">Ibuprofen</option>
          <option value="__other__" data-translate="med_other">Other…</option>
        </select>

        <!-- Added medications appear here, each with an editable mg field and a remove button. -->
        <div id="medList"></div>
      </section>

      <!-- ===== Diary ===== -->
      <label class="field">
        <span data-translate="q_note">Diary entry</span>
        <textarea name="note" rows="4" data-translate-placeholder="note_placeholder" placeholder="anything you want to remember about today..."></textarea>
      </label>

      <button type="submit" data-translate="submit">Save</button>
    </form>
  </main>

  <!-- Load app.js with the same ?v= cache-buster -->
  <script>
    (function () {
      var v = new URLSearchParams(location.search).get("v");
      var suffix = v ? "?v=" + encodeURIComponent(v) : "";
      document.write('<script src="app.js' + suffix + '"><\/script>');
    })();
  </script>
</body>
</html>
